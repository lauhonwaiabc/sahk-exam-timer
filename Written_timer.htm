<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Written Exam Timer</title>
    <link rel="stylesheet" href="timer_style.css"/>
    <script src="config/written_config.js"></script>
    <script src="config/written_script.js"></script>
    <style>
        body { background: #f9f9f9; }
        #writtenStyles {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        #scriptBanner {
            background: #1a237e;
            color: #fff;
            padding: 0;
            border-radius: 12px;
            margin: 15px auto;
            max-width: 1100px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.5s ease;
            box-shadow: 0 4px 20px rgba(26,35,126,0.3);
        }
        #scriptBanner .script-time {
            font-size: 0.9em;
            font-weight: 700;
            color: #90caf9;
            margin-top: 18px;
            letter-spacing: 2px;
        }
        #scriptBanner .script-text {
            font-size: 1.5em;
            font-weight: 600;
            padding: 15px 30px 20px;
            line-height: 1.5;
        }
        #scriptBanner .script-placeholder {
            color: #90caf9;
            font-size: 1.1em;
            font-weight: 400;
            padding: 30px;
        }
        #scriptBanner.speaking {
            background: #ff6f00;
            box-shadow: 0 4px 25px rgba(255,111,0,0.4);
        }
        #scriptBanner.speaking .script-time { color: #fff3e0; }
        #scriptBanner.done {
            background: #2e7d32;
        }
        #scriptBanner.done .script-time { color: #c8e6c9; }

        #timetableContainer {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
            padding: 25px 30px;
        }
        #timetableContainer h2 {
            text-align: center;
            color: #d33;
            margin: 0 0 20px;
            font-weight: 900;
        }
        .timetable-table {
            width: 100%;
            border-collapse: collapse;
        }
        .timetable-table th {
            background: #1a237e;
            color: white;
            padding: 12px 16px;
            font-weight: 700;
            text-align: left;
        }
        .timetable-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #e0e0e0;
            font-weight: 500;
        }
        .timetable-table tr.active td {
            background: #fff9c4;
            font-weight: 700;
            color: #e65100;
        }
        .timetable-table tr:last-child td { border-bottom: none; }
        .timetable-table .exam-session td { color: #d33; }
        .timetable-table .break-session td { color: #555; font-style: italic; }

        #speechStatus {
            text-align: center;
            font-size: 0.85em;
            color: #888;
            margin: 5px 0 15px;
            min-height: 1.2em;
        }
        .offset-btn {
            font-size: 0.9em;
            padding: 4px 10px;
            margin: 2px;
            border-radius: 5px;
            border: 1px solid #bbb;
            background: #f5f5f5;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .offset-btn:hover { background: #e0e0e0; }
        .offset-btn:active { background: #ccc; }
        #writtenStyles .timer.non-exam { color: #999; }
        @media (max-width: 600px) {
            #scriptBanner .script-text { font-size: 1.1em; padding: 12px 16px 16px; }
            .timetable-table th, .timetable-table td { padding: 8px 10px; font-size: 0.85em; }
            #timetableContainer { padding: 15px; }
        }
    </style>
</head>
<body>
<div id="writtenStyles">
<div id="clock">00:00:00</div>
<div id="syncWarning" style="display:none;background:#fff3e0;color:#e65100;text-align:center;padding:6px;font-weight:700;font-size:0.9em;"></div>
<div id="controls">
    <button id="scheduleStartBtn">Schedule Start</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" disabled>Stop &amp; Reset</button>
    <button id="muteBtn" aria-pressed="false">Mute</button>
    <button id="testSpeechBtn">Test Speech</button>
    <button id="toggleTimetableBtn">Show Timetable</button>
</div>

<div id="startTimeContainer" style="text-align:center;margin:10px 0;">
    <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
    <input id="startTimeInput" type="time" step="1"
           style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
    <button id="applyStartTimeBtn"
            style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
    <div style="margin-top:6px;">
        <button class="offset-btn" data-offset="-3600" title="Shift schedule 60 minutes earlier">-60m</button>
        <button class="offset-btn" data-offset="-900" title="Shift schedule 15 minutes earlier">-15m</button>
        <button class="offset-btn" data-offset="-300" title="Shift schedule 5 minutes earlier">-5m</button>
        <button class="offset-btn" data-offset="-60" title="Shift schedule 1 minute earlier">-1m</button>
        <button class="offset-btn" data-offset="60" title="Shift schedule 1 minute later">+1m</button>
        <button class="offset-btn" data-offset="300" title="Shift schedule 5 minutes later">+5m</button>
        <button class="offset-btn" data-offset="900" title="Shift schedule 15 minutes later">+15m</button>
        <button class="offset-btn" data-offset="3600" title="Shift schedule 60 minutes later">+60m</button>
    </div>
</div>

<div id="topMenu">
    <ul id="sectionsList"></ul>
    <br/>
    <ul id="subsectionsList"></ul>
</div>

<div id="bottomContent">
    <div class="timer" id="timerDisplay">00:00</div>
    <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>

    <div id="scriptBanner">
        <div class="script-placeholder">Script announcements will appear here automatically</div>
    </div>
    <div id="speechStatus"></div>

    <div id="timetableContainer" style="display:none;">
        <h2>Examination Timetable</h2>
        <table class="timetable-table" id="timetableTable">
            <thead><tr><th>Time</th><th>Session</th></tr></thead>
            <tbody id="timetableBody"></tbody>
        </table>
    </div>
</div>
</div>

<script>
(() => {
    const clockEl = document.getElementById('clock');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scheduleStartBtn = document.getElementById('scheduleStartBtn');
    const muteBtn = document.getElementById('muteBtn');
    const toggleTimetableBtn = document.getElementById('toggleTimetableBtn');
    const sectionsList = document.getElementById('sectionsList');
    const subsectionsList = document.getElementById('subsectionsList');
    const timerDisplay = document.getElementById('timerDisplay');
    const infoDisplay = document.getElementById('infoDisplay');
    const startTimeInput = document.getElementById('startTimeInput');
    const applyStartTimeBtn = document.getElementById('applyStartTimeBtn');
    const scriptBanner = document.getElementById('scriptBanner');
    const speechStatus = document.getElementById('speechStatus');
    const timetableBody = document.getElementById('timetableBody');
    const toHHMM = s => s.slice(0, 5);

    let isRunning = false;
    let isStarting = false;
    let selectedSessionIndex = 0;
    let selectedPhaseIndex = 0;
    let countdownInterval = null;
    let countdownSecondsLeft = 0;
    let startTime = null;
    let endTime = null;
    let isMuted = true;
    let beeping = false;
    let timeOffset = 0;
    let isTimetableVisible = false;

    let startTimeStr = START_TIME;
    startTimeInput.value = startTimeStr;

    let scheduledTimes = [];
    let SESSION_TIMES = generateSessionTimes();
    let scriptOffsets = [];
    let processedGroups = new Set();
    let currentScriptGroup = -1;
    let scriptSentenceIndex = 0;
    let advanceSentenceTimer = null;
    let clearScriptTimeout = null;

    let synthSupported = typeof window.speechSynthesis !== 'undefined' && window.speechSynthesis !== null;
    let synth = window.speechSynthesis;

    function addSeconds(timeStr, seconds) {
        let [h, m, s] = timeStr.split(':').map(Number);
        let date = new Date(0, 0, 0, h, m, s);
        date.setSeconds(date.getSeconds() + seconds);
        return date.toTimeString().slice(0, 8);
    }

    function generateSessionTimes() {
        let times = [], current = startTimeStr;
        for (const phases of SESSION_PHASES) {
            const totalDuration = phases.reduce((sum, p) => sum + p.duration, 0);
            let next = addSeconds(current, totalDuration);
            times.push(`${toHHMM(current)}-${toHHMM(next)}`);
            current = next;
        }
        return times;
    }

    function parseTimeString(str) {
        if (!str) return 0;
        const [h, m, s = 0] = str.split(':').map(Number);
        return h * 3600 + m * 60 + s;
    }

    function formatTimeHMSSec(secs) {
        secs %= 86400;
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function recalculateScheduledTimes() {
        scheduledTimes = [];
        let t = parseTimeString(startTimeStr);
        for (let s = 0; s < SESSION_PHASES.length; s++) {
            scheduledTimes[s] = [];
            for (const phase of SESSION_PHASES[s]) {
                scheduledTimes[s].push(t);
                t += phase.duration;
            }
        }
    }

    recalculateScheduledTimes();
    computeScriptOffsets();
    resetScriptIndices();

    let utterance = null;

    function getEnglishVoice() {
        if (!synthSupported) return null;
        const voices = synth.getVoices();
        for (const v of voices) {
            if (v.lang && v.lang.startsWith('en') && !/chinese|cantonese|hong.?kong/i.test(v.name)) {
                return v;
            }
        }
        for (const v of voices) {
            if (v.lang && v.lang.startsWith('en')) return v;
        }
        return null;
    }

    function prepareSpeechText(text) {
        return text
            .replace(/\bPaper I\b(?!\d)/g, 'Paper 1')
            .replace(/\bPaper II\b(?!\d)/g, 'Paper 2')
            .replace(/\bPaper III\b(?!\d)/g, 'Paper 3');
    }

    function speakText(text, onDone) {
        if (!synthSupported) {
            speechStatus.textContent = 'Speech not supported';
            if (onDone) setTimeout(onDone, 100);
            return false;
        }
        try {
            if (synth.speaking) synth.cancel();
            synth.resume();
            utterance = new SpeechSynthesisUtterance(prepareSpeechText(text));
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            const engVoice = getEnglishVoice();
            if (engVoice) utterance.voice = engVoice;
            utterance.onend = () => {
                if (onDone) onDone();
            };
            utterance.onerror = (e) => {
                console.error('Speech error:', e.error || e.message || e);
                speechStatus.textContent = 'Speech error: ' + (e.error || 'unknown');
                if (onDone) setTimeout(onDone, 500);
            };
            const success = synth.speak(utterance);
            if (success === false) {
                speechStatus.textContent = 'speak() returned false';
                if (onDone) setTimeout(onDone, 500);
            }
            return true;
        } catch(e) {
            speechStatus.textContent = 'speak() threw: ' + e.message;
            console.error('speakText exception:', e);
            if (onDone) setTimeout(onDone, 500);
            return false;
        }
    }

    function updateClock() {
        const now = getCorrectedNow();
        clockEl.textContent = new Date(now).toTimeString().slice(0, 8);
    }

    setInterval(updateClock, 1000);
    updateClock();

    function setSessionPhaseMenusEnabled(enabled) {
        const toggleElements = (list, selectedIdx) => {
            [...list.children].forEach((li, idx) => {
                if (enabled) {
                    li.classList.remove('disabled');
                    li.tabIndex = 0;
                    li.style.pointerEvents = '';
                    li.style.opacity = '';
                } else {
                    if (idx === selectedIdx) {
                        li.classList.add('disabled', 'selected');
                        li.tabIndex = -1;
                        li.style.pointerEvents = 'none';
                        li.style.opacity = '1';
                    } else {
                        li.classList.add('disabled');
                        li.classList.remove('selected');
                        li.tabIndex = -1;
                        li.style.pointerEvents = 'none';
                        li.style.opacity = '0.5';
                    }
                }
            });
        };
        toggleElements(sectionsList, selectedSessionIndex);
        toggleElements(subsectionsList, selectedPhaseIndex);
    }

    function renderSections() {
        sectionsList.innerHTML = '';
        for (let i = 0; i < SESSION_PHASES.length; i++) {
            const li = document.createElement('li');
            li.textContent = SESSION_TITLES[i] || `Session ${i + 1}`;
            if (i === selectedSessionIndex) li.classList.add('selected');
            li.addEventListener('click', () => {
                if (isRunning) return;
                if (selectedSessionIndex !== i) {
                    selectedSessionIndex = i;
                    selectedPhaseIndex = 0;
                    resetTimerToCurrentPhase();
                    startTime = endTime = null;
                    renderSections();
                    renderPhases();
                    renderBottomContent();
                }
            });
            sectionsList.appendChild(li);
        }
        setSessionPhaseMenusEnabled(!isRunning);
    }

    function renderPhases() {
        subsectionsList.innerHTML = '';
        const phases = SESSION_PHASES[selectedSessionIndex];
        phases.forEach((phase, idx) => {
            const li = document.createElement('li');
            li.textContent = phase.title;
            if (idx === selectedPhaseIndex) li.classList.add('selected');
            li.addEventListener('click', () => {
                if (isRunning) return;
                if (selectedPhaseIndex !== idx) {
                    selectedPhaseIndex = idx;
                    resetTimerToCurrentPhase();
                    startTime = endTime = null;
                    renderPhases();
                    renderBottomContent();
                }
            });
            subsectionsList.appendChild(li);
        });
        setSessionPhaseMenusEnabled(!isRunning);
    }

    function formatAbsoluteTime(ms) {
        return new Date(ms).toTimeString().slice(0, 8);
    }

    function getTimetableIndex(sessionIdx, phaseIdx) {
        let idx = 0;
        for (let s = 0; s < sessionIdx; s++) {
            idx += SESSION_PHASES[s].length;
        }
        return idx + phaseIdx;
    }

    function renderTimetable() {
        timetableBody.innerHTML = '';
        const currentTime = new Date(getCorrectedNow());
        const currentSec = currentTime.getHours() * 3600 + currentTime.getMinutes() * 60;

        TIMETABLE.forEach((row, idx) => {
            const tr = document.createElement('tr');
            const parts = row.time.split(' - ');
            if (parts.length === 2) {
                const startParts = parts[0].split(':');
                const endParts = parts[1].split(':');
                const startSec = parseInt(startParts[0]) * 3600 + parseInt(startParts[1]) * 60;
                const endSec = parseInt(endParts[0]) * 3600 + parseInt(endParts[1]) * 60;
                const isTimeMatch = currentSec >= startSec && currentSec < endSec;
                const isTimerMatch = isRunning && idx === getTimetableIndex(selectedSessionIndex, selectedPhaseIndex);
                if (isTimeMatch || isTimerMatch) {
                    tr.classList.add('active');
                }
            }
            const isExam = row.session.includes('Paper') && !row.session.includes('Break') && !row.session.includes('Collection');
            if (isExam) tr.classList.add('exam-session');
            const isBreak = row.session === 'Break' || row.session === 'Lunch';
            if (isBreak) tr.classList.add('break-session');
            tr.innerHTML = `<td>${row.time}</td><td>${row.session}</td>`;
            timetableBody.appendChild(tr);
        });
    }

    function renderBottomContent() {
        const phase = SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex];
        updateTimerDisplay();
        const sessionLabel = SESSION_TITLES[selectedSessionIndex] || `Session ${selectedSessionIndex + 1}`;
        const heading = EXAM_TITLE;
        const schedSec = scheduledTimes[selectedSessionIndex]?.[selectedPhaseIndex];
        const phaseStartStr = schedSec != null ? formatTimeHMSSec(schedSec).slice(0, 5) : '';
        const phaseEndSec = schedSec != null ? schedSec + SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration : 0;
        const phaseEndStr = formatTimeHMSSec(phaseEndSec).slice(0, 5);
        const phaseTimeStr = phaseStartStr ? `${phaseStartStr}-${phaseEndStr}` : (SESSION_TIMES[selectedSessionIndex] || '');
        const schedTimeStr = schedSec ? formatTimeHMSSec(schedSec) : '';
        const displayStartTime = isRunning && startTime !== null ? formatAbsoluteTime(startTime) : schedTimeStr;
        const displayEndTime = isRunning && endTime !== null ? formatAbsoluteTime(endTime) : '';
        const sessionLine = isRunning
            ? `${sessionLabel} (${phase.title}), ${phaseTimeStr} (${phase.info})<br><span style="color:#1976d2;">Current: ${displayStartTime} - ${displayEndTime}</span>`
            : `${sessionLabel} (${phase.title}), ${phaseTimeStr} (${phase.info})<br><span style="color:#1976d2;">Scheduled Start: ${displayStartTime}</span>`;
        infoDisplay.innerHTML = `<div style="font-weight:700;font-size:1em;margin-bottom:6px;text-align:center;">${heading}</div><div style="font-weight:600;font-size:1em;text-align:center;">${sessionLine}</div>`;
        renderTimetable();
    }

    function isExamPhase(sessionIdx, phaseIdx) {
        const sessionTitle = SESSION_TITLES[sessionIdx];
        const phaseTitle = SESSION_PHASES[sessionIdx][phaseIdx].title;
        if (sessionTitle === 'Pre-Examination' || sessionTitle === 'Break' || sessionTitle === 'Lunch') return false;
        if (phaseTitle === 'Paper Collection' || phaseTitle === 'Transition' || phaseTitle === 'Preparation') return false;
        return true;
    }

    function updateTimerDisplay() {
        timerDisplay.textContent = formatTime(countdownSecondsLeft);
        timerDisplay.classList.toggle('non-exam', !isExamPhase(selectedSessionIndex, selectedPhaseIndex));
    }

    function resetTimerToCurrentPhase() {
        countdownSecondsLeft = SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration;
    }

    function computeScriptOffsets() {
        scriptOffsets = SCRIPT_DATA.map(entry => {
            let absOffset = 0;
            for (let s = 0; s < entry.session; s++) {
                for (const p of SESSION_PHASES[s]) {
                    absOffset += p.duration;
                }
            }
            for (let p = 0; p < entry.phase; p++) {
                absOffset += SESSION_PHASES[entry.session][p].duration;
            }
            return absOffset + entry.offset;
        });
    }

    function getCurrentElapsed() {
        if (isRunning && startTime) {
            return (getCorrectedNow() - startTime) / 1000;
        }
        const now = new Date(getCorrectedNow());
        const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        const startSec = parseTimeString(startTimeStr);
        return currentSec - startSec;
    }

    function resetScriptIndices() {
        if (advanceSentenceTimer) { clearTimeout(advanceSentenceTimer); advanceSentenceTimer = null; }
        if (clearScriptTimeout) { clearTimeout(clearScriptTimeout); clearScriptTimeout = null; }
        currentScriptGroup = -1;
        scriptSentenceIndex = 0;
        clearScriptBanner();
        processedGroups.clear();
    }

    function secsToHHMM(secs) {
        return formatTimeHMSSec(secs).slice(0, 5);
    }

    function getPhaseSec(sessionIdx, phaseIdx) {
        const schedSec = scheduledTimes[sessionIdx]?.[phaseIdx];
        if (schedSec == null) return null;
        if (isRunning && startTime) {
            const curSchedSec = scheduledTimes[selectedSessionIndex]?.[selectedPhaseIndex];
            if (curSchedSec == null) return schedSec;
            const diffSec = schedSec - curSchedSec;
            const d = new Date(startTime + diffSec * 1000);
            return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
        }
        return schedSec;
    }

    function resolveTimePlaceholders(text, groupIndex) {
        if (groupIndex < 0 || groupIndex >= SCRIPT_DATA.length) return text;
        const entry = SCRIPT_DATA[groupIndex];

        const currentTime = new Date(getCorrectedNow()).toTimeString().slice(0, 5);

        const finishTime = isRunning && endTime !== null
            ? new Date(endTime).toTimeString().slice(0, 5)
            : (() => {
                const phaseEndSec = getPhaseSec(entry.session, entry.phase);
                if (phaseEndSec == null) return '';
                return secsToHHMM(phaseEndSec + SESSION_PHASES[entry.session][entry.phase].duration);
            })();

        let nextStartTime = '';
        for (let s = entry.session + 1; s < SESSION_TITLES.length; s++) {
            if (SESSION_TITLES[s].includes('Paper')) {
                for (let p = 0; p < SESSION_PHASES[s].length; p++) {
                    if (!SESSION_PHASES[s][p].title.includes('Preparation')) {
                        const sec = getPhaseSec(s, p);
                        if (sec != null) nextStartTime = secsToHHMM(sec);
                        break;
                    }
                }
                break;
            }
        }

        let debriefTime = '';
        const lastS = SESSION_PHASES.length - 1;
        const lastP = SESSION_PHASES[lastS].length - 1;
        const debriefSec = getPhaseSec(lastS, lastP);
        if (debriefSec != null) debriefTime = secsToHHMM(debriefSec + 1800);

        return text
            .replace(/\{\{CURRENT\}\}/g, currentTime)
            .replace(/\{\{FINISH\}\}/g, finishTime)
            .replace(/\{\{NEXT_START\}\}/g, nextStartTime)
            .replace(/\{\{DEBRIEF_TIME\}\}/g, debriefTime)
            .replace(/\{\{PAPER_I_PAGES\}\}/g, PAPER_I_PAGES)
            .replace(/\{\{PAPER_CA_PAGES\}\}/g, PAPER_CA_PAGES)
            .replace(/\{\{PAPER_INV_PAGES\}\}/g, PAPER_INV_PAGES)
            .replace(/\{\{PAPER_RAD_PAGES\}\}/g, PAPER_RAD_PAGES)
            .replace(/\{\{PAPER_MCQ_PAGES\}\}/g, PAPER_MCQ_PAGES);
    }

    function finishCurrentGroup() {
        scriptBanner.classList.remove('speaking');
        scriptBanner.classList.add('done');
        speechStatus.textContent = 'Script complete for this time';
        currentScriptGroup = -1;
        scriptSentenceIndex = 0;
        if (clearScriptTimeout) clearTimeout(clearScriptTimeout);
        clearScriptTimeout = setTimeout(() => {
            scriptBanner.innerHTML = `<div class="script-placeholder">Script announcements will appear here automatically</div>`;
            scriptBanner.classList.remove('done');
        }, 60000);
    }

    function advanceSentence() {
        if (currentScriptGroup < 0) return;
        advanceSentenceTimer = null;
        scriptSentenceIndex++;
        const group = SCRIPT_DATA[currentScriptGroup];
        if (group && scriptSentenceIndex < group.sentences.length) {
            showCurrentSentence();
        } else {
            finishCurrentGroup();
        }
    }

    function showCurrentSentence() {
        const group = SCRIPT_DATA[currentScriptGroup];
        if (!group) return;
        if (scriptSentenceIndex >= group.sentences.length) {
            finishCurrentGroup();
            return;
        }
        const raw = group.sentences[scriptSentenceIndex];
        const sentence = resolveTimePlaceholders(raw, currentScriptGroup);
        const displayTime = addSeconds(startTimeStr, scriptOffsets[currentScriptGroup]).slice(0, 5);
        const sentNum = scriptSentenceIndex + 1;
        const sentTotal = group.sentences.length;
        scriptBanner.innerHTML = `
            <div class="script-time">${displayTime} &mdash; ${sentNum}/${sentTotal}</div>
            <div class="script-text">${sentence}</div>`;
        scriptBanner.classList.remove('done');
        scriptBanner.classList.add('speaking');
        speechStatus.textContent = `Reading sentence ${sentNum} of ${sentTotal}...`;

        if (advanceSentenceTimer) clearTimeout(advanceSentenceTimer);

        if (!isMuted) {
            advanceSentenceTimer = null;
            speakText(sentence, () => {
                if (advanceSentenceTimer) clearTimeout(advanceSentenceTimer);
                advanceSentenceTimer = setTimeout(advanceSentence, 300);
            });
        } else {
            advanceSentenceTimer = setTimeout(advanceSentence, 8000);
        }
    }

    function showScript(index) {
        if (advanceSentenceTimer) { clearTimeout(advanceSentenceTimer); advanceSentenceTimer = null; }
        if (clearScriptTimeout) { clearTimeout(clearScriptTimeout); clearScriptTimeout = null; }
        processedGroups.add(index);
        currentScriptGroup = index;
        scriptSentenceIndex = 0;
        showCurrentSentence();
    }

    function checkScript() {
        if (isRunning && startTime) {
            const dur = SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration;
            const phaseElapsed = dur - countdownSecondsLeft;
            for (let i = 0; i < SCRIPT_DATA.length; i++) {
                if (processedGroups.has(i)) continue;
                if (SCRIPT_DATA[i].session !== selectedSessionIndex) continue;
                if (SCRIPT_DATA[i].phase !== selectedPhaseIndex) continue;
                const diff = phaseElapsed - SCRIPT_DATA[i].offset;
                if (diff >= 0 && diff < 30) {
                    showScript(i);
                    return;
                }
            }
        } else {
            const now = new Date(getCorrectedNow());
            const currentSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            const scheduleSec = parseTimeString(startTimeStr);
            for (let i = 0; i < SCRIPT_DATA.length; i++) {
                if (processedGroups.has(i)) continue;
                const scriptSec = scheduleSec + scriptOffsets[i];
                const diff = currentSec - scriptSec;
                if (diff >= 0 && diff < 30) {
                    showScript(i);
                    return;
                }
            }
        }
    }

    function catchUpScripts() {
        const dur = SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration;
        const phaseElapsed = dur - countdownSecondsLeft;
        let found = false;
        for (let i = 0; i < SCRIPT_DATA.length; i++) {
            if (processedGroups.has(i)) continue;
            if (SCRIPT_DATA[i].session !== selectedSessionIndex) continue;
            if (SCRIPT_DATA[i].phase !== selectedPhaseIndex) continue;
            const diff = phaseElapsed - SCRIPT_DATA[i].offset;
            if (diff >= -1 && diff <= 15) {
                showScript(i);
                found = true;
                break;
            }
        }
        if (!found) {
            for (let i = 0; i < SCRIPT_DATA.length; i++) {
                if (processedGroups.has(i)) continue;
                if (SCRIPT_DATA[i].session !== selectedSessionIndex) continue;
                if (SCRIPT_DATA[i].phase !== selectedPhaseIndex) continue;
                if (phaseElapsed >= SCRIPT_DATA[i].offset) {
                    showScript(i);
                    found = true;
                    break;
                }
            }
        }
        if (found) {
            for (let i = 0; i < SCRIPT_DATA.length; i++) {
                if (processedGroups.has(i)) continue;
                if (SCRIPT_DATA[i].session !== selectedSessionIndex) continue;
                if (SCRIPT_DATA[i].phase !== selectedPhaseIndex) continue;
                if (phaseElapsed >= SCRIPT_DATA[i].offset + 1) {
                    processedGroups.add(i);
                }
            }
        }
    }

    function clearScriptBanner() {
        scriptBanner.innerHTML = `<div class="script-placeholder">Script announcements will appear here automatically</div>`;
        scriptBanner.classList.remove('speaking', 'done');
        currentScriptGroup = -1;
        scriptSentenceIndex = 0;
        if (advanceSentenceTimer) { clearTimeout(advanceSentenceTimer); advanceSentenceTimer = null; }
        if (clearScriptTimeout) { clearTimeout(clearScriptTimeout); clearScriptTimeout = null; }
        speechStatus.textContent = '';
    }

    function moveToNextPhase() {
        let s = selectedSessionIndex;
        let p = selectedPhaseIndex + 1;
        if (p >= SESSION_PHASES[s].length) {
            s++;
            p = 0;
            if (s >= SESSION_PHASES.length) {
                stopTimers();
                alert('All sessions completed!');
                return;
            }
        }
        selectedSessionIndex = s;
        selectedPhaseIndex = p;
        const dur = SESSION_PHASES[s][p].duration;
        if (endTime) {
            endTime = endTime + dur * 1000;
        } else {
            startTime = getCorrectedNow();
            endTime = startTime + dur * 1000;
        }
        countdownSecondsLeft = dur;
        renderSections();
        renderPhases();
        renderBottomContent();
        if (isRunning) { startCountdownForSelected(); catchUpScripts(); }
    }

    function startCountdownForSelected() {
        clearInterval(countdownInterval);
        updateTimerDisplay();
        let lastDisplayedSecond = -1;
        countdownInterval = setInterval(() => {
            if (!isRunning) return;
            const now = getCorrectedNow();
            const diff = endTime - now;
            countdownSecondsLeft = diff > 0 ? Math.ceil(diff / 1000) : 0;
            if (countdownSecondsLeft !== lastDisplayedSecond) {
                lastDisplayedSecond = countdownSecondsLeft;
                updateTimerDisplay();
                renderTimetable();
            }
            if (countdownSecondsLeft <= 0) {
                moveToNextPhase();
            }
        }, 100);
    }

    function warmupSpeech() {
        if (!synthSupported || synth.speaking) return;
        try {
            synth.cancel();
            const wu = new SpeechSynthesisUtterance(' ');
            wu.volume = 0.01;
            synth.speak(wu);
        } catch(e) {}
    }

    async function startTimers(schedulePhaseStartMs) {
        if (isRunning || isStarting) return;
        isStarting = true;
        await fetchStandardTimeOffset();

        if (schedulePhaseStartMs != null) {
            startTime = schedulePhaseStartMs;
            endTime = startTime + SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration * 1000;
        } else {
            startTime = getCorrectedNow();
            endTime = startTime + SESSION_PHASES[selectedSessionIndex][selectedPhaseIndex].duration * 1000;
        }
        countdownSecondsLeft = Math.ceil((endTime - startTime) / 1000);

        computeScriptOffsets();
        isRunning = true;
        isStarting = false;
        resetScriptIndices();
        checkScript();

        if (currentScriptGroup < 0) {
            catchUpScripts();
        }

        warmupSpeech();
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        stopBtn.disabled = false;
        scheduleStartBtn.disabled = true;
        setSessionPhaseMenusEnabled(false);
        renderBottomContent();
        startCountdownForSelected();
    }

    function pauseTimers() {
        if (!isRunning) return;
        isRunning = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = false;
        scheduleStartBtn.disabled = false;
        clearInterval(countdownInterval);
        const diff = endTime - getCorrectedNow();
        countdownSecondsLeft = diff > 0 ? Math.ceil(diff / 1000) : 0;
        startTime = endTime = null;
        setSessionPhaseMenusEnabled(true);
        updateTimerDisplay();
    }

    function stopTimers() {
        isRunning = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        stopBtn.disabled = true;
        scheduleStartBtn.disabled = false;
        clearInterval(countdownInterval);
        resetTimerToCurrentPhase();
        startTime = null;
        endTime = null;
        updateTimerDisplay();
        renderBottomContent();
        setSessionPhaseMenusEnabled(true);
    }

    scheduleStartBtn.onclick = () => {
        recalculateScheduledTimes();
        SESSION_TIMES = generateSessionTimes();
        computeScriptOffsets();
        resetScriptIndices();
        renderSections();
        renderPhases();
        renderBottomContent();

        const elapsed = getCurrentElapsed();
        let found = false;
        let cumulative = 0;
        let phaseStartSec = 0;
        outerLoop: for (let s = 0; s < SESSION_PHASES.length; s++) {
            for (let p = 0; p < SESSION_PHASES[s].length; p++) {
                const phaseEnd = cumulative + SESSION_PHASES[s][p].duration;
                if (elapsed >= cumulative && elapsed < phaseEnd) {
                    selectedSessionIndex = s;
                    selectedPhaseIndex = p;
                    countdownSecondsLeft = phaseEnd - elapsed;
                    startTime = getCorrectedNow();
                    endTime = startTime + countdownSecondsLeft * 1000;
                    phaseStartSec = cumulative;
                    found = true;
                    break outerLoop;
                }
                cumulative = phaseEnd;
            }
        }
        if (!found) {
            selectedSessionIndex = 0;
            selectedPhaseIndex = 0;
            resetTimerToCurrentPhase();
            startTime = getCorrectedNow();
            endTime = startTime + countdownSecondsLeft * 1000;
        }
        renderSections();
        renderPhases();
        renderBottomContent();

        if (found) {
            const nowMs = getCorrectedNow();
            const schedulePhaseStartMs = nowMs - (elapsed - phaseStartSec) * 1000;
            startTimers(schedulePhaseStartMs);
        } else {
            startTimers();
        }
    };

    startBtn.onclick = () => startTimers();
    pauseBtn.onclick = pauseTimers;
    stopBtn.onclick = stopTimers;

    muteBtn.onclick = () => {
        isMuted = !isMuted;
        muteBtn.textContent = isMuted ? 'Mute' : 'Sound On';
        muteBtn.setAttribute('aria-pressed', (!isMuted).toString());
        if (isMuted && synth.speaking) synth.cancel();
    };

    testSpeechBtn.onclick = () => {
        if (isMuted) { speechStatus.textContent = 'Muted - click "Sound On" first'; return; }
        if (!synthSupported) { speechStatus.textContent = 'synth unavailable'; return; }
        const voices = synth.getVoices();
        speechStatus.textContent = 'Speaking... (voices: ' + voices.length + ', speaking: ' + synth.speaking + ')';
        speakText('This is a test of the speech synthesis system', () => {
            speechStatus.textContent = 'Test complete';
        });
    };

    toggleTimetableBtn.onclick = () => {
        isTimetableVisible = !isTimetableVisible;
        document.getElementById('timetableContainer').style.display = isTimetableVisible ? 'block' : 'none';
        toggleTimetableBtn.textContent = isTimetableVisible ? 'Hide Timetable' : 'Show Timetable';
        if (isTimetableVisible) renderTimetable();
    };

    function adjustStartTime(offsetSeconds) {
        let [h, m, s] = startTimeStr.split(':').map(Number);
        let totalSec = h * 3600 + m * 60 + s + offsetSeconds;
        totalSec = ((totalSec % 86400) + 86400) % 86400;
        startTimeStr = formatTimeHMSSec(totalSec);
        startTimeInput.value = startTimeStr;
        localStorage.setItem('scheduleOffset', String(parseTimeString(startTimeStr) - parseTimeString(START_TIME)));
    }

    applyStartTimeBtn.onclick = () => {
        startTimeStr = startTimeInput.value || START_TIME;
        localStorage.setItem('scheduleOffset', String(parseTimeString(startTimeStr) - parseTimeString(START_TIME)));
        if (!isRunning) { computeScriptOffsets(); resetScriptIndices(); }
        recalculateScheduledTimes();
        SESSION_TIMES = generateSessionTimes();
        renderSections();
        renderPhases();
        renderBottomContent();
    };

    document.querySelectorAll('.offset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            adjustStartTime(parseInt(btn.dataset.offset, 10));
        });
    });

    setInterval(() => {
        if (isRunning) {
            checkScript();
            return;
        }
        if (isStarting) return;
        const now = new Date(getCorrectedNow());
        const nowSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
        outerLoop: for (let s = 0; s < scheduledTimes.length; s++) {
            for (let p = 0; p < scheduledTimes[s].length; p++) {
                if (Math.abs(nowSec - scheduledTimes[s][p]) < 1) {
                    if (selectedSessionIndex !== s || selectedPhaseIndex !== p) {
                        selectedSessionIndex = s;
                        selectedPhaseIndex = p;
                        resetTimerToCurrentPhase();
                        startTime = endTime = null;
                        renderSections();
                        renderPhases();
                        renderBottomContent();
                    }
                    startTimers();
                    break outerLoop;
                }
            }
        }
    }, 1000);

    renderSections();
    renderPhases();
    resetTimerToCurrentPhase();
    renderBottomContent();
    startTime = endTime = null;

    let syncFailureWarning = false;

    async function fetchStandardTimeOffset() {
        try {
            const response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Hong_Kong');
            const data = await response.json();
            const standardTime = new Date(data.dateTime).getTime();
            timeOffset = standardTime - Date.now();
            syncFailureWarning = false;
            const warn = document.getElementById('syncWarning');
            if (warn) warn.style.display = 'none';
        } catch (e) {
            console.error('Failed to fetch standard time, using local time fallback', e);
            timeOffset = 0;
            if (!syncFailureWarning) {
                syncFailureWarning = true;
                const warn = document.getElementById('syncWarning');
                if (warn) {
                    warn.textContent = '\u26A0 Time sync unavailable \u2014 using local time';
                    warn.style.display = 'block';
                }
            }
        }
    }

    function getCorrectedNow() {
        return Date.now() + timeOffset;
    }

    fetchStandardTimeOffset();
    setInterval(fetchStandardTimeOffset, 60000);

    window.addEventListener('beforeunload', () => {
        clearInterval(countdownInterval);
        if (advanceSentenceTimer) clearTimeout(advanceSentenceTimer);
        if (clearScriptTimeout) clearTimeout(clearScriptTimeout);
        if (synthSupported) { synth.cancel(); }
    });
})();
</script>
</body>
</html>
