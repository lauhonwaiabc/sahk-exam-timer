<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TimerCore Tests</title>
<style>
body{font-family:monospace;max-width:800px;margin:20px auto;padding:0 20px}
h1{color:#2e7d32}
.test-result{padding:8px 12px;margin:4px 0;border-radius:4px}
.pass{background:#e8f5e9;color:#1b5e20}.fail{background:#ffebee;color:#c62828}
.summary{font-weight:700;margin-top:20px;padding:12px;border-radius:4px;font-size:1.1em}
.all-pass{background:#c8e6c9;color:#1b5e20}
.has-fail{background:#ffcdd2;color:#c62828}
</style>
</head>
<body>
<h1>TimerCore Pure Function Tests</h1>
<div id="results"></div>

<!-- Minimal DOM stubs required by TimerCore.init() -->
<div style="display:none">
  <div id="clock"></div><div id="syncWarning"></div>
  <ul id="sectionsList"></ul><ul id="subsectionsList"></ul>
  <div id="timerDisplay"></div><div id="infoDisplay"></div>
  <input id="startTimeInput"/><button id="applyStartTimeBtn"></button>
  <button id="startBtn"></button><button id="pauseBtn"></button>
  <button id="stopBtn"></button><button id="scheduleStartBtn"></button>
  <button id="muteBtn"></button>
</div>

<script src="../config/sahk.js"></script>
<script src="../config/constants.js"></script>
<script src="../config/timer-core.js"></script>
<script>
'use strict';
var results = document.getElementById('results');
var passCount = 0, failCount = 0;

function assert(condition, name) {
  var div = document.createElement('div');
  if (condition) {
    div.className = 'test-result pass';
    div.textContent = '\u2713 ' + name;
    passCount++;
  } else {
    div.className = 'test-result fail';
    div.textContent = '\u2717 ' + name;
    failCount++;
  }
  results.appendChild(div);
}

var ctrl = TimerCore.createController({
  startTimeStr: '00:00:00',
  sessionPhases: [[{title:'Test', duration:60, info:''}]],
  examTitle: 'Test Suite',
  getSessionLabel: function(i) { return 'Test'; },
  renderContent: function() {},
  mutedByDefault: true
});

// --- addSeconds ---
assert(ctrl.addSeconds('00:00:00', 60) === '00:01:00', 'addSeconds: 60 seconds from midnight');
assert(ctrl.addSeconds('23:59:30', 30) === '00:00:00', 'addSeconds: 30 seconds from 23:59:30 (wraps past midnight)');
assert(ctrl.addSeconds('23:59:30', 60) === '00:00:30', 'addSeconds: 60 seconds wraps past midnight');
assert(ctrl.addSeconds('00:00:00', 3600) === '01:00:00', 'addSeconds: 3600 seconds = 1 hour');
assert(ctrl.addSeconds('00:00:00', 86400) === '00:00:00', 'addSeconds: 86400 seconds = 24 hours (wraps)');

// --- parseTimeString ---
assert(ctrl.parseTimeString('00:00:00') === 0, 'parseTimeString: midnight = 0 seconds');
assert(ctrl.parseTimeString('01:00:00') === 3600, 'parseTimeString: 1 hour = 3600 seconds');
assert(ctrl.parseTimeString('00:01:00') === 60, 'parseTimeString: 1 minute = 60 seconds');
assert(ctrl.parseTimeString('00:00:01') === 1, 'parseTimeString: 1 second');
assert(ctrl.parseTimeString('23:59:59') === 86399, 'parseTimeString: 23:59:59 = 86399 seconds');
assert(ctrl.parseTimeString('12:30') === 45000, 'parseTimeString: HH:MM without seconds (12:30)');
assert(ctrl.parseTimeString('') === 0, 'parseTimeString: empty string = 0');
assert(ctrl.parseTimeString(null) === 0, 'parseTimeString: null = 0');

// --- formatTimeHMSSec ---
assert(ctrl.formatTimeHMSSec(0) === '00:00:00', 'formatTimeHMSSec: 0 seconds');
assert(ctrl.formatTimeHMSSec(60) === '00:01:00', 'formatTimeHMSSec: 60 seconds');
assert(ctrl.formatTimeHMSSec(3600) === '01:00:00', 'formatTimeHMSSec: 3600 seconds');
assert(ctrl.formatTimeHMSSec(3661) === '01:01:01', 'formatTimeHMSSec: 3661 seconds');
assert(ctrl.formatTimeHMSSec(86399) === '23:59:59', 'formatTimeHMSSec: 86399 seconds');

// --- formatTime ---
assert(ctrl.formatTime(0) === '00:00', 'formatTime: 0 seconds');
assert(ctrl.formatTime(65) === '01:05', 'formatTime: 65 seconds = 1:05');
assert(ctrl.formatTime(3600) === '60:00', 'formatTime: 3600 seconds = 60:00');
assert(ctrl.formatTime(3599) === '59:59', 'formatTime: 3599 seconds = 59:59');

// --- formatAbsoluteTime ---
var noon = new Date(2024, 0, 1, 12, 0, 0).getTime();
assert(ctrl.formatAbsoluteTime(noon).slice(0, 8) === '12:00:00', 'formatAbsoluteTime: noon returns 12:00:00');

// --- Controller API existence ---
assert(typeof ctrl.init === 'function', 'API: init is a function');
assert(typeof ctrl.startTimers === 'function', 'API: startTimers is a function');
assert(typeof ctrl.pauseTimers === 'function', 'API: pauseTimers is a function');
assert(typeof ctrl.stopTimers === 'function', 'API: stopTimers is a function');
assert(typeof ctrl.scheduleStart === 'function', 'API: scheduleStart is a function');
assert(typeof ctrl.adjustStartTime === 'function', 'API: adjustStartTime is a function');
assert(typeof ctrl.getCorrectedNow === 'function', 'API: getCorrectedNow is a function');
assert(typeof ctrl.isRunning === 'boolean', 'API: isRunning is a boolean');
assert(typeof ctrl.selectedSessionIndex === 'number', 'API: selectedSessionIndex is number');
assert(typeof ctrl.selectedPhaseIndex === 'number', 'API: selectedPhaseIndex is number');
assert(typeof ctrl.isMuted === 'boolean', 'API: isMuted is boolean');
assert(ctrl.isMuted === true, 'API: mutedByDefault respected');

// --- start / pause / stop state transitions ---
ctrl.startTimers();
assert(ctrl.isRunning === true, 'State: isRunning true after startTimers');
ctrl.pauseTimers();
assert(ctrl.isRunning === false, 'State: isRunning false after pauseTimers');
ctrl.stopTimers();
assert(ctrl.isRunning === false, 'State: isRunning false after stopTimers');

// --- Summary ---
var summary = document.createElement('div');
summary.className = 'summary ' + (failCount === 0 ? 'all-pass' : 'has-fail');
summary.textContent = 'Total: ' + (passCount + failCount) + ' tests | Passed: ' + passCount + ' | Failed: ' + failCount;
results.appendChild(summary);
</script>
</body>
</html>
