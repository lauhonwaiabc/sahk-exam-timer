<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Debriefing Timer</title>
    <link rel="stylesheet" href="../timer_style.css"/>
    <script src="../config/debrief_config.js"></script>
    <script src="../config/debrief_data.js"></script>
    <script src="../config/timer-core.js"></script>
    <script src="../config/common_timer.js"></script>
    <script src="../config/debrief_timer.js"></script>
    <style>
        #examinerModeContainer { display: flex; justify-content: center; gap: 24px; max-width: 1800px; margin: 0 auto; align-items: flex-start; }
        .scenario-column { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 280px; max-width: 500px; }
        .scenario-column .viva-box { width: auto; }
        .scenario-header { text-align: center; font-weight: 900; font-size: 1.4em; color: #2e7d32; padding: 8px 0; letter-spacing: 1.2px; border-bottom: 3px solid #4caf50; margin-bottom: 4px; }
        .examiner-group-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
        .examiner-group-list span { background: #e8f5e9; padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 1.1em; color: #1b5e20; }
        .examiner-group-label { text-align: center; font-size: 1.2em; font-weight: 700; color: #555; margin-bottom: 6px; }
        .candidate-group { font-size: 0.85em; color: #555; font-weight: 600; margin-top: 4px; }
        .candidate-examiner { font-size: 0.8em; color: #777; margin-top: 2px; }
        .candidate-scenario { font-size: 0.75em; color: #999; margin-top: 1px; }
        #sectionsList li.preparation { background: #9e9e9e; color: white; }
        #sectionsList li.preparation.selected { background: #757575; color: white; box-shadow: 0 4px 10px rgb(117 117 117 / 0.6); }
    </style>
</head>
<body>
<div id="clock">00:00:00</div>
<div id="syncWarning" style="display:none;background:#fff3e0;color:#e65100;text-align:center;padding:6px;font-weight:700;font-size:0.9em;"></div>
<div id="controls">
    <button id="scheduleStartBtn">Schedule Start</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" disabled>Stop &amp; Reset</button>
    <button id="muteBtn" aria-pressed="false">Mute</button>
</div>
<div id="startTimeContainer">
    <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
    <input id="startTimeInput" type="time" step="1" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
    <button id="applyStartTimeBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
    <div style="margin-top:6px;">
        <button class="offset-btn" data-offset="-3600" title="60 minutes earlier">-60m</button>
        <button class="offset-btn" data-offset="-900" title="15 minutes earlier">-15m</button>
        <button class="offset-btn" data-offset="-300" title="5 minutes earlier">-5m</button>
        <button class="offset-btn" data-offset="-60" title="1 minute earlier">-1m</button>
        <button class="offset-btn" data-offset="60" title="1 minute later">+1m</button>
        <button class="offset-btn" data-offset="300" title="5 minutes later">+5m</button>
        <button class="offset-btn" data-offset="900" title="15 minutes later">+15m</button>
        <button class="offset-btn" data-offset="3600" title="60 minutes later">+60m</button>
    </div>
</div>
<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Enter Candidate ID or Examiner Name" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:260px;margin-right:8px;"/>
    <button id="isolateBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Isolate</button>
</div>
<div id="topMenu">
    <ul id="sectionsList"></ul>
    <br/>
    <ul id="subsectionsList"></ul>
</div>
<div id="bottomContent">
    <div class="timer" id="timerDisplay">00:00</div>
    <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>
    <div id="examinerModeContainer" aria-live="polite"></div>
    <div id="candidateModeContainer" aria-live="polite" style="display:none;"></div>
</div>
<script>
DebriefTimer.start();
</script>
</body>
</html>
