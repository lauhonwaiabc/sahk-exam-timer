<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Debriefing Timer</title>
  <link rel="stylesheet" href="../timer_style.css"/>
  <script src="../config/sahk.js"></script>
  <script src="../config/constants.js"></script>
  <script src="../config/time-utils.js"></script>
  <script src="../config/phase-engine.js"></script>
  <script src="../config/firebase-config.js"></script>
  <script src="../config/audio.js"></script>
  <script src="../config/time-sync.js"></script>
  <script src="../config/debrief_config.js"></script>
  <script src="../config/debrief_data.js"></script>
  <script src="../config/debrief_script.js"></script>
  <script src="../config/timer-core.js"></script>
  <script src="../config/common_timer.js"></script>
  <script src="../config/exam_tts.js"></script>
  <script src="../config/debrief_timer.js"></script>
  <style>
    #examinerModeContainer { display: flex; justify-content: center; gap: 24px; max-width: 1800px; margin: 0 auto; align-items: flex-start; }
    .scenario-column { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 280px; max-width: 500px; }
    .scenario-column .viva-box { width: auto; }
    .scenario-header { text-align: center; font-weight: 900; font-size: 1.4em; color: #2e7d32; padding: 8px 0; letter-spacing: 1.2px; border-bottom: 3px solid #4caf50; margin-bottom: 4px; }
    .examiner-group-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
    .examiner-group-list span { background: #e8f5e9; padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 1.1em; color: #1b5e20; }
    .examiner-group-label { text-align: center; font-size: 1.2em; font-weight: 700; color: #555; margin-bottom: 6px; }
    .candidate-group { font-size: 0.85em; color: #555; font-weight: 600; margin-top: 4px; }
    .candidate-examiner { font-size: 0.8em; color: #777; margin-top: 2px; }
    .candidate-scenario { font-size: 0.75em; color: #999; margin-top: 1px; }
    #sectionsList li.preparation { background: #9e9e9e; color: white; }
    #sectionsList li.preparation.selected { background: #757575; color: white; box-shadow: 0 4px 10px rgb(117 117 117 / 0.6); }
    #scriptBanner .script-placeholder { color: #90caf9; font-size: 1.1em; font-weight: 400; padding: 15px 30px; }
    #scriptBanner .script-text { font-size: 1.3em; font-weight: 600; padding: 12px 25px 16px; line-height: 1.4; }
    #scriptBanner.speaking { background: #ff6f00; box-shadow: 0 4px 25px rgba(255,111,0,0.4); }
    #scriptBanner.speaking .script-placeholder { color: #fff3e0; }
    #scriptBanner.done { background: #2e7d32; }
    #scriptBanner.done .script-placeholder { color: #c8e6c9; }
    #ttsControls {
      display: flex; justify-content: center; align-items: center; gap: 14px;
      margin: 10px 0; flex-wrap: wrap;
    }
    #ttsControls label { font-size: 0.85em; font-weight: 700; color: #555; }
    #ttsControls input[type="range"] { width: 90px; }
    #ttsControls select { font-size: 0.85em; padding: 4px 8px; border-radius: 4px; border: 1px solid #bbb; }
    #ttsControls button { font-size: 0.85em; padding: 5px 12px; }
    #speechStatus { text-align: center; font-size: 0.8em; color: #888; margin: 5px 0 10px; min-height: 1.2em; }
    @media (max-width: 600px) { #scriptBanner { display: none !important; } }
  </style>
</head>
<body>
<div id="clock" style="display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 0"><span id="timeDisplay">00:00:00</span><span id="syncStatusBadge" style="color:#fff;background:#000;padding:0 4px;font:8px Arial;border-radius:2px;line-height:1">Source: Local</span></div>

<div id="controls">
  <button id="scheduleStartBtn">Schedule Start</button>
  <button id="startBtn">Start</button>
  <button id="pauseBtn" disabled>Pause</button>
  <button id="stopBtn" disabled>Stop & Reset</button>
  <button id="muteBtn" aria-pressed="false">Mute</button>
  <div id="volumeControl" class="desktop-only"><span id="volumeLabel">Vol: 50%</span><input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5"></div>
  <button id="testSpeechBtn">Test Speech</button>
  <button id="keyboardHelpBtn" title="Keyboard shortcuts">?</button>
</div>
<div id="ttsControls">
  <label id="ttsRateLabel">Speed: 1.0x</label>
  <input type="range" id="ttsRateSlider" min="0.5" max="2.5" step="0.1" value="1.0">
  <label id="ttsPitchLabel">Pitch: 1.0</label>
  <input type="range" id="ttsPitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
  <label for="voiceSelect">Voice</label>
  <select id="voiceSelect">
    <option value="auto">Auto (default)</option>
  </select>
</div>
<div id="speechStatus">Speech engine initializing...</div>
<div id="startTimeContainer">
  <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
  <input id="startTimeInput" type="time" step="1" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
  <button id="applyStartTimeBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
  <div style="margin-top:6px;">
    <button class="offset-btn" data-offset="-3600">-60m</button>
    <button class="offset-btn" data-offset="-900">-15m</button>
    <button class="offset-btn" data-offset="-300">-5m</button>
    <button class="offset-btn" data-offset="-60">-1m</button>
    <button class="offset-btn" data-offset="60">+1m</button>
    <button class="offset-btn" data-offset="300">+5m</button>
    <button class="offset-btn" data-offset="900">+15m</button>
    <button class="offset-btn" data-offset="3600">+60m</button>
  </div>
</div>
<div id="searchContainer">
  <input id="searchInput" type="text" placeholder="Enter Candidate ID or Examiner Name" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:260px;margin-right:8px;"/>
  <button id="isolateBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Isolate</button>
</div>
<div id="topMenu"><ul id="sectionsList"></ul><br/><ul id="subsectionsList"></ul></div>
<div id="bottomContent">
  <div class="timer" id="timerDisplay" role="timer" aria-live="polite" aria-label="Countdown timer">00:00</div>
  <div id="progressBarContainer"><div class="progress-fill"></div></div>
  <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>
  <div id="scriptBanner" aria-live="assertive" style="max-width:1100px;margin:15px auto;background:#1a237e;color:#fff;padding:0;border-radius:12px;min-height:60px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:0 4px 20px rgba(26,35,126,0.3);">
    <div class="script-placeholder" id="scriptPlaceholder" style="color:#90caf9;font-size:1.1em;font-weight:400;padding:15px 30px;">Script announcements will appear here automatically</div>
  </div>
  <div id="examinerModeContainer" aria-live="polite"></div>
  <div id="candidateModeContainer" aria-live="polite" style="display:none;"></div>
</div>
<script>
DebriefTimer.start();
</script>
</body>
</html>
