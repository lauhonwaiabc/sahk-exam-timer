<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SAHK Exam Timer - Login</title>
  <script src="../config/osce_stations.js"></script>
  <script src="../config/viva_tables.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #f9f9f9;
      color: #222;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      max-width: 500px;
      width: 90%;
      background: white;
      padding: 40px 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border-radius: 12px;
      text-align: center;
    }
    .login-container h1 {
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 1.8rem;
      color: #d33;
      letter-spacing: 1.5px;
    }
    .login-container h2 {
      font-weight: 700;
      margin-bottom: 25px;
      font-size: 1rem;
      color: #555;
    }
    .login-select-group {
      margin-bottom: 18px;
      text-align: left;
    }
    .login-select-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 5px;
      color: #333;
    }
    .login-select-group select,
    .login-select-group input {
      width: 100%;
      font-size: 1.05em;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #bbb;
      box-sizing: border-box;
    }
    .login-btn {
      display: inline-block;
      background: #4caf50;
      color: white;
      padding: 12px 30px;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s;
      width: 100%;
      margin-top: 10px;
    }
    .login-btn:hover { background: #388e3c; }
    .login-error {
      color: #d32f2f;
      font-weight: 700;
      margin-top: 10px;
      display: none;
    }
    .login-back {
      display: block;
      margin-top: 15px;
      color: #1976d2;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9em;
    }
    .login-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="login-container">
  <h1>SAHK OSCE / Viva Exam Timer</h1>

  <div class="login-select-group">
    <label for="examSelect">Exam</label>
    <select id="examSelect">
      <option value="osce_am">OSCE - AM</option>
      <option value="osce_pm">OSCE - PM</option>
      <option value="viva_am">Viva - AM</option>
      <option value="viva_pm">Viva - PM</option>
    </select>
  </div>

  <div class="login-select-group">
    <label for="roleSelect">Role</label>
    <select id="roleSelect" onchange="onRoleChange()">
      <option value="">--Select One--</option>
      <option value="candidate">Candidate</option>
      <option value="examiner">Examiner</option>
      <option value="admin">Admin</option>
    </select>
  </div>

  <div class="login-select-group" id="passwordGroup" style="display:none;">
    <label for="passwordInput">Password</label>
    <input id="passwordInput" type="password" placeholder="Enter password"/>
  </div>

  <div class="login-select-group" id="candidateSetupGroup" style="display:none;">
    <label for="candidateNumberSelect">Candidate Number</label>
    <select id="candidateNumberSelect">
      <option value="">--Select--</option>
    </select>
  </div>

  <div class="login-select-group" id="examinerSetupGroup" style="display:none;">
    <label for="stationSelect" id="stationSelectLabel">Station / Table</label>
    <select id="stationSelect">
      <option value="">--Select--</option>
    </select>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Enter</button>
  <div class="login-error" id="loginError"></div>
  <a class="login-back" href="../index.htm">Back to Main Menu</a>
</div>

<script>
'use strict';

const PASSWORDS = {
  examiner: 'examiner',
  admin: 'sahk_admin'
};

const EXAM_PAGES = {
  osce_am: 'OSCE_timer.htm?mode=am',
  osce_pm: 'OSCE_timer.htm?mode=pm',
  viva_am: 'Viva_timer.htm?mode=am',
  viva_pm: 'Viva_timer.htm?mode=pm'
};

const CANDIDATES_BY_EXAM = {
  osce_am: ["05","24","21","13","08","27","19","10","03","31","22","18","15","12","30"],
  osce_pm: ["06","28","26","23","16","07","29","11","04","01","25","20","17","14","32"],
  viva_am: ["10","21","18","15","05","22","03","19","07","12","24","31","30","13","27"],
  viva_pm: ["11","23","20","17","06","25","04","29","08","14","26","01","32","16","28"]
};

function populateCandidateSelect() {
  const exam = document.getElementById('examSelect').value;
  const sel = document.getElementById('candidateNumberSelect');
  sel.innerHTML = '<option value="">--Select--</option>';
  (CANDIDATES_BY_EXAM[exam] || []).forEach(function(cn) {
    var opt = document.createElement('option');
    opt.value = cn;
    opt.textContent = cn;
    sel.appendChild(opt);
  });
}

function populateStationSelect() {
  const exam = document.getElementById('examSelect').value;
  const sel = document.getElementById('stationSelect');
  const label = document.getElementById('stationSelectLabel');
  sel.innerHTML = '<option value="">--Select--</option>';

  let names = [];
  if (exam.startsWith('osce')) {
    names = STATION_NAMES || [];
    label.textContent = 'Station';
  } else if (exam.startsWith('viva')) {
    names = exam.endsWith('pm') ? (TABLE_NAMES_PM || []) : (TABLE_NAMES_AM || []);
    label.textContent = 'Examiner';
  }

  names.forEach(function(name, i) {
    var opt = document.createElement('option');
    opt.value = (i + 1) + ':' + name;
    opt.textContent = (i + 1) + ' - ' + name;
    sel.appendChild(opt);
  });
}

function onRoleChange() {
  const role = document.getElementById('roleSelect').value;
  const pwGroup = document.getElementById('passwordGroup');
  const examinerGroup = document.getElementById('examinerSetupGroup');
  const candidateGroup = document.getElementById('candidateSetupGroup');
  const loginBtn = document.getElementById('loginBtn');

  if (!role) {
    pwGroup.style.display = 'none';
    examinerGroup.style.display = 'none';
    candidateGroup.style.display = 'none';
    loginBtn.disabled = true;
    return;
  }
  loginBtn.disabled = false;

  if (role === 'candidate') {
    pwGroup.style.display = 'none';
    examinerGroup.style.display = 'none';
    candidateGroup.style.display = 'block';
    populateCandidateSelect();
  } else if (role === 'examiner') {
    pwGroup.style.display = 'block';
    examinerGroup.style.display = 'block';
    candidateGroup.style.display = 'none';
    populateStationSelect();
  } else if (role === 'admin') {
    pwGroup.style.display = 'block';
    examinerGroup.style.display = 'none';
    candidateGroup.style.display = 'none';
  }
}

document.getElementById('examSelect').addEventListener('change', function() {
  var role = document.getElementById('roleSelect').value;
  if (role === 'examiner') {
    populateStationSelect();
  } else if (role === 'candidate') {
    populateCandidateSelect();
  }
});

document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('candidateNumberSelect').addEventListener('change', function(e) {
  if (this.value) setTimeout(doLogin, 100);
});

function doLogin() {
  const role = document.getElementById('roleSelect').value;
  const exam = document.getElementById('examSelect').value;
  const password = document.getElementById('passwordInput').value;
  const errorEl = document.getElementById('loginError');

  if (role === 'candidate') {
    const cn = document.getElementById('candidateNumberSelect').value;
    if (!cn) {
      errorEl.textContent = 'Please select your candidate number';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    sessionStorage.setItem('sahk_role_config', JSON.stringify({ role:'candidate', exam:exam, candidateNumber:cn }));
    window.location.href = EXAM_PAGES[exam];
    return;
  }

  const expectedPw = PASSWORDS[role];
  if (password !== expectedPw) {
    errorEl.textContent = role === 'examiner'
      ? 'Incorrect password. Hint: the default examiner password'
      : 'Incorrect password. Hint: the default admin password';
    errorEl.style.display = 'block';
    return;
  }

  errorEl.style.display = 'none';

  let config = {
    role: role,
    exam: exam
  };

  if (role === 'examiner') {
    const val = document.getElementById('stationSelect').value;
    if (!val) {
      errorEl.textContent = 'Please select a station/examiner';
      errorEl.style.display = 'block';
      return;
    }
    var parts = val.split(':');
    config.stationNo = parseInt(parts[0], 10);
    config.stationName = parts[1];
    const examType = exam.startsWith('osce') ? 'osce' : 'viva';
    config.searchPrefix = (examType === 'osce' ? 'Station ' : 'Table ') + config.stationNo;
  }

  sessionStorage.setItem('sahk_role_config', JSON.stringify(config));
  window.location.href = EXAM_PAGES[exam];
}
onRoleChange();
</script>
</body>
</html>
