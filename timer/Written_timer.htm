<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Written Exam Timer</title>
  <link rel="stylesheet" href="../timer_style.css"/>
  <script src="../config/sahk.js"></script>
  <script src="../config/constants.js"></script>
  <script src="../config/time-utils.js"></script>
  <script src="../config/phase-engine.js"></script>
  <script src="../config/error-handler.js"></script>
  <script src="../config/firebase-config.js"></script>
  <script src="../config/audio.js"></script>
  <script src="../config/time-sync.js"></script>
  <script src="../config/written_config.js"></script>
  <script src="../config/written_script.js"></script>
  <script src="../config/timer-core.js"></script>
  <script src="../config/sahk_written.js"></script>
  <style>
    body { background: #f9f9f9; }
    #writtenStyles { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    #scriptBanner {
      background: #1a237e; color: #fff; padding: 0; border-radius: 12px;
      margin: 15px auto; max-width: 1100px; min-height: 100px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; transition: all 0.5s ease; box-shadow: 0 4px 20px rgba(26,35,126,0.3);
    }
    #scriptBanner .script-time { font-size: 0.9em; font-weight: 700; color: #90caf9; margin-top: 18px; letter-spacing: 2px; }
    #scriptBanner .script-text { font-size: 1.5em; font-weight: 600; padding: 15px 30px 20px; line-height: 1.5; }
    #scriptBanner .script-placeholder { color: #90caf9; font-size: 1.1em; font-weight: 400; padding: 30px; }
    #scriptBanner.speaking { background: #ff6f00; box-shadow: 0 4px 25px rgba(255,111,0,0.4); }
    #scriptBanner.speaking .script-time { color: #fff3e0; }
    #scriptBanner.done { background: #2e7d32; }
    #scriptBanner.done .script-time { color: #c8e6c9; }
    #timetableContainer {
      max-width: 800px; margin: 20px auto; background: white;
      border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.1); padding: 25px 30px;
    }
    #timetableContainer h2 { text-align: center; color: #d33; margin: 0 0 20px; font-weight: 900; }
    .timetable-table { width: 100%; border-collapse: collapse; }
    .timetable-table th { background: #1a237e; color: white; padding: 12px 16px; font-weight: 700; text-align: left; }
    .timetable-table td { padding: 10px 16px; border-bottom: 1px solid #e0e0e0; font-weight: 500; }
    .timetable-table tr.active td { background: #fff9c4; font-weight: 700; color: #e65100; }
    .timetable-table tr:last-child td { border-bottom: none; }
    .timetable-table .exam-session td { color: #d33; }
    .timetable-table .break-session td { color: #555; font-style: italic; }
    #speechStatus { text-align: center; font-size: 0.85em; color: #888; margin: 5px 0 15px; min-height: 1.2em; }
    #ttsControls {
      display: flex; justify-content: center; align-items: center; gap: 16px;
      margin: 10px 0; flex-wrap: wrap;
    }
    #ttsControls label { font-size: 0.85em; font-weight: 700; color: #555; }
    #ttsControls input[type="range"] { width: 100px; }
    #ttsControls button { font-size: 0.9em; padding: 6px 14px; }
    .offset-btn { font-size: 0.9em; padding: 4px 10px; margin: 2px; border-radius: 5px;
      border: 1px solid #bbb; background: #f5f5f5; color: #333; font-weight: 600; cursor: pointer; }
    .offset-btn:hover { background: #e0e0e0; }
    #writtenStyles .timer.non-exam { color: #999; }
    @media (max-width: 600px) {
      #scriptBanner .script-text { font-size: 1.1em; padding: 12px 16px 16px; }
      .timetable-table th, .timetable-table td { padding: 8px 10px; font-size: 0.85em; }
      #timetableContainer { padding: 15px; }
    }
  </style>
</head>
<body>
<noscript><p style="text-align:center;font-weight:700;color:#d32f2f;">JavaScript is required for this exam timer.</p></noscript>
<div id="clock">00:00:00<div id="syncStatusBadge"></div></div>
<div id="syncWarning" style="display:none;background:#fff3e0;color:#e65100;text-align:center;padding:6px;font-weight:700;font-size:0.9em;"></div>
<div id="writtenStyles">
<div id="controls">
  <button id="scheduleStartBtn">Schedule Start</button>
  <button id="startBtn">Start</button>
  <button id="pauseBtn" disabled>Pause</button>
  <button id="stopBtn" disabled>Stop & Reset</button>
  <button id="muteBtn" aria-pressed="false">Mute</button>
  <button id="keyboardHelpBtn" title="Keyboard shortcuts">?</button>
  <button id="testSpeechBtn">Test Speech</button>
  <button id="toggleTimetableBtn">Show Timetable</button>
</div>

<div id="ttsControls">
  <div id="volumeControl" class="desktop-only"><span id="volumeLabel">Vol: 50%</span><input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5"></div>
  <label id="ttsRateLabel">Speed: 1.0x</label>
  <input type="range" id="ttsRateSlider" min="0.5" max="2.5" step="0.1" value="1.0">
  <label id="ttsPitchLabel">Pitch: 1.0</label>
  <input type="range" id="ttsPitchSlider" min="0.5" max="2.0" step="0.1" value="1.0">
  <label for="voiceSelect">Voice</label>
  <select id="voiceSelect" style="font-size:0.85em;padding:4px 8px;border-radius:4px;border:1px solid #bbb;">
    <option value="auto">Auto</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>
</div>

<div id="startTimeContainer" style="text-align:center;margin:10px 0;">
  <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
  <input id="startTimeInput" type="time" step="1" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
  <button id="applyStartTimeBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
  <div style="margin-top:6px;">
    <button class="offset-btn" data-offset="-3600">-60m</button>
    <button class="offset-btn" data-offset="-900">-15m</button>
    <button class="offset-btn" data-offset="-300">-5m</button>
    <button class="offset-btn" data-offset="-60">-1m</button>
    <button class="offset-btn" data-offset="60">+1m</button>
    <button class="offset-btn" data-offset="300">+5m</button>
    <button class="offset-btn" data-offset="900">+15m</button>
    <button class="offset-btn" data-offset="3600">+60m</button>
  </div>
</div>

<div id="topMenu"><ul id="sectionsList"></ul><br/><ul id="subsectionsList"></ul></div>
</div>

<div id="bottomContent">
  <div class="timer" id="timerDisplay" role="timer" aria-live="polite" aria-label="Countdown timer">00:00</div>
  <div id="progressBarContainer"><div class="progress-fill"></div></div>
  <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>
  <div id="scriptBanner" aria-live="assertive" aria-atomic="true">
    <div class="script-placeholder">Script announcements will appear here automatically</div>
  </div>
  <div id="speechStatus" aria-live="polite"></div>
  <div id="timetableContainer" style="display:none;">
    <h2>Examination Timetable</h2>
    <table class="timetable-table" id="timetableTable">
      <thead><tr><th>Time</th><th>Session</th></tr></thead>
      <tbody id="timetableBody"></tbody>
    </table>
  </div>
</div>

<script>
Sahk.get('WrittenTimer').start({
  startTimeStr: START_TIME,
  sessionTitles: SESSION_TITLES,
  examTitle: EXAM_TITLE,
  timetable: TIMETABLE,
  scriptData: SCRIPT_DATA,
  paperPages: {
    PAPER_I_PAGES: PAPER_I_PAGES,
    PAPER_CA_PAGES: PAPER_CA_PAGES,
    PAPER_INV_PAGES: PAPER_INV_PAGES,
    PAPER_RAD_PAGES: PAPER_RAD_PAGES,
    PAPER_MCQ_PAGES: PAPER_MCQ_PAGES
  }
});
</script>
</body>
</html>
