<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Viva Exam Timer - PM</title>
    <link rel="stylesheet" href="timer_style.css"/>
    <script src="config/sahk.js"></script>
    <script src="config/constants.js"></script>
    <script src="config/time-utils.js"></script>
    <script src="config/phase-engine.js"></script>
    <script src="config/audio.js"></script>
    <script src="config/time-sync.js"></script>
    <script src="config/viva_config.js"></script>
    <script src="config/viva_tables.js"></script>
    <script src="config/viva_data_pm.js"></script>
    <script src="config/timer-core.js"></script>
</head>
<body>
<div id="clock">00:00:00</div>
<div id="syncWarning" style="display:none;background:#fff3e0;color:#e65100;text-align:center;padding:6px;font-weight:700;font-size:0.9em;"></div>
<div id="controls">
    <button id="scheduleStartBtn">Schedule Start</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" disabled>Stop &amp; Reset</button>
    <button id="muteBtn" aria-pressed="false">Mute</button>
    <button id="toggleModeBtn" aria-pressed="false">Switch to Candidate Mode</button>
</div>
<div id="startTimeContainer">
    <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
    <input id="startTimeInput" type="time" step="1" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
    <button id="applyStartTimeBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
    <div style="margin-top:6px;">
        <button class="offset-btn" data-offset="-3600" title="60 minutes earlier">-60m</button>
        <button class="offset-btn" data-offset="-900" title="15 minutes earlier">-15m</button>
        <button class="offset-btn" data-offset="-300" title="5 minutes earlier">-5m</button>
        <button class="offset-btn" data-offset="-60" title="1 minute earlier">-1m</button>
        <button class="offset-btn" data-offset="60" title="1 minute later">+1m</button>
        <button class="offset-btn" data-offset="300" title="5 minutes later">+5m</button>
        <button class="offset-btn" data-offset="900" title="15 minutes later">+15m</button>
        <button class="offset-btn" data-offset="3600" title="60 minutes later">+60m</button>
    </div>
</div>
<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Enter Candidate ID, Table Name or Table Number" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:260px;margin-right:8px;"/>
    <button id="searchBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Search</button>
</div>
<div id="topMenu">
    <ul id="sectionsList"></ul>
    <br/>
    <ul id="subsectionsList"></ul>
</div>
<div id="bottomContent">
    <div class="timer" id="timerDisplay">00:00</div>
    <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>
    <div id="tableModeContainer" aria-live="polite"></div>
    <div id="candidateModeContainer" aria-live="polite" style="display:none;"></div>
</div>
<script>
(() => {
    const TABLE_NAMES = TABLE_NAMES_PM;

    function getSessionLabel(i) {
        if (ENABLE_PREPARATION && i === PREPARATION_SESSION_INDEX) return 'Preparation';
        if (ENABLE_BREAK && i === BREAK_SESSION_INDEX) return 'Break';
        let base = i - (ENABLE_PREPARATION ? 1 : 0) - (ENABLE_BREAK && i > BREAK_SESSION_INDEX ? 1 : 0);
        return base >= 0 ? `Session ${base + 1}` : `Session ${i + 1}`;
    }

    function getDataSessionKey(sessionIndex) {
        if (ENABLE_PREPARATION && sessionIndex === 0) return "Preparation";
        if (ENABLE_BREAK && sessionIndex === BREAK_SESSION_INDEX) return "Break";
        let baseIdx = sessionIndex;
        if (ENABLE_PREPARATION && sessionIndex > 0) baseIdx--;
        if (ENABLE_BREAK && sessionIndex > BREAK_SESSION_INDEX) baseIdx--;
        return `Session ${baseIdx + 1}`;
    }

    let isCandidateMode = false;
    let lastSearchValue = '';

    const ctrl = TimerCore.createController({
        startTimeStr: START_TIME_PM,
        sessionPhases: SESSION_PHASES,
        examTitle: 'SAHK Final Examination Preparation Course - Viva Examination',
        getSessionLabel,
        mutedByDefault: true,
        renderContent: (sessionIdx, phaseIdx) => {
            if (isCandidateMode) renderCandidateMode();
            else renderTableMode();
        }
    });

    function highlightBoxes(searchValue) {
        document.querySelectorAll('.highlight').forEach(el => el.classList.remove('highlight'));
        if (!searchValue) return;
        const search = searchValue.trim().toLowerCase();
        let tableNum = null;
        const match = search.match(/^table\s*(\d{1,2})$/i);
        if (match) {
            tableNum = parseInt(match[1], 10);
            if (tableNum < 1 || tableNum > NUM_TABLES) tableNum = null;
        }
        let tableNameIndex = null;
        if (!tableNum) tableNameIndex = TABLE_NAMES.findIndex(t => t.toLowerCase().includes(search));

        if (isCandidateMode) {
            document.getElementById('candidateModeContainer').querySelectorAll('.candidate-cell').forEach(cell => {
                const num = cell.querySelector('.candidate-number')?.textContent.trim();
                if (num === searchValue) cell.classList.add('highlight');
                if (tableNum) {
                    const label = cell.querySelector('.candidate-table')?.textContent.match(/Table\s*(\d+)/i);
                    if (label && +label[1] === tableNum) cell.classList.add('highlight');
                }
                if (tableNameIndex >= 0) {
                    const label = cell.querySelector('.candidate-table')?.textContent.toLowerCase();
                    if (label && label.includes(TABLE_NAMES[tableNameIndex].toLowerCase())) cell.classList.add('highlight');
                }
            });
        } else {
            document.getElementById('tableModeContainer').querySelectorAll('.viva-box').forEach((box, idx) => {
                const cand = box.querySelector('.candidate-row .candidate-name')?.textContent.trim();
                const obs = box.querySelector('.observer-row .candidate-name')?.textContent.trim();
                if (cand === searchValue || obs === searchValue) box.classList.add('highlight');
                if (tableNum === idx + 1) box.classList.add('highlight');
                if (tableNameIndex === idx) box.classList.add('highlight');
            });
        }
    }

    function doSearch() {
        lastSearchValue = document.getElementById('searchInput').value.trim();
        highlightBoxes(lastSearchValue);
    }

    function renderTableMode() {
        const tableMode = document.getElementById('tableModeContainer');
        const candidateMode = document.getElementById('candidateModeContainer');
        candidateMode.style.display = 'none';
        tableMode.style.display = 'flex';
        const sessionKey = getDataSessionKey(ctrl.selectedSessionIndex);
        const details = vivaData[sessionKey];
        if (!details) {
            tableMode.innerHTML = '<p style="text-align:center;color:#666;">No data available.</p>';
            return;
        }
        tableMode.innerHTML = Array(NUM_TABLES).fill(0).map((_, i) => {
            const candidate = details.Candidate[i] || '\u2014';
            const observer = details.Observer[i] || '\u2014';
            return `<div class="viva-box" tabindex="0" aria-label="Table ${i + 1} details">
              <div class="viva-title">Table ${i + 1}<br><span style="font-size:0.7em;color:#555;">${TABLE_NAMES[i]}</span></div>
              <div class="candidate-row"><div class="role-label">Candidate</div><div class="candidate-name">${candidate}</div></div>
              <div class="observer-row"><div class="role-label">Observer</div><div class="candidate-name">${observer}</div></div>
            </div>`;
        }).join('');
        highlightBoxes(lastSearchValue);
    }

    function renderCandidateMode() {
        const tableMode = document.getElementById('tableModeContainer');
        const candidateMode = document.getElementById('candidateModeContainer');
        tableMode.style.display = 'none';
        candidateMode.style.display = 'flex';
        const sessionKey = getDataSessionKey(ctrl.selectedSessionIndex);
        const details = vivaData[sessionKey];
        if (!details) {
            candidateMode.innerHTML = '<p style="text-align:center;color:#666;">No data available.</p>';
            return;
        }
        const entries = [];
        for (let i = 0; i < NUM_TABLES; i++) {
            if (details.Candidate[i]) entries.push({number: details.Candidate[i], tableIndex: i, role: 'Candidate'});
            if (details.Observer[i]) entries.push({number: details.Observer[i], tableIndex: i, role: 'Observer'});
        }
        entries.sort((a, b) => a.number.localeCompare(b.number));
        candidateMode.innerHTML = entries.map(({number, tableIndex, role}) =>
            `<div class="${role === 'Observer' ? 'candidate-cell observer-cell' : 'candidate-cell'}" tabindex="0" aria-label="${role} ${number}, Table ${tableIndex + 1}">
              <div class="candidate-number">${number}</div>
              <div class="candidate-role ${role.toLowerCase()}">${role}</div>
              <div class="candidate-table">Table ${tableIndex + 1}<br><span style="font-size:0.8em;color:#555;">${TABLE_NAMES[tableIndex]}</span></div>
            </div>`
        ).join('');
        highlightBoxes(lastSearchValue);
    }

    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === "Enter") doSearch(); });
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('input', () => {
        if (!document.getElementById('searchInput').value.trim()) {
            lastSearchValue = '';
            highlightBoxes('');
        }
    });

    document.getElementById('toggleModeBtn').onclick = () => {
        isCandidateMode = !isCandidateMode;
        document.getElementById('toggleModeBtn').textContent = isCandidateMode ? 'Switch to Table Mode' : 'Switch to Candidate Mode';
        document.getElementById('toggleModeBtn').setAttribute('aria-pressed', isCandidateMode.toString());
        isCandidateMode ? renderCandidateMode() : renderTableMode();
    };

    document.body.addEventListener('click', () => {
        const ctx = (() => { try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } })();
        if (ctx) ctx.close();
    }, { once: true });

    ctrl.init();
})();
</script>
</body>
</html>
