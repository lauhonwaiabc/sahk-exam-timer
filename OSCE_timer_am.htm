<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>OSCE Exam Timer - AM</title>
    <link rel="stylesheet" href="timer_style.css"/>
    <script src="config/sahk.js"></script>
    <script src="config/constants.js"></script>
    <script src="config/time-utils.js"></script>
    <script src="config/phase-engine.js"></script>
    <script src="config/audio.js"></script>
    <script src="config/time-sync.js"></script>
    <script src="config/osce_config.js"></script>
    <script src="config/osce_stations.js"></script>
    <script src="config/osce_data_am.js"></script>
    <script src="config/timer-core.js"></script>
    <style>
        #mapModeContainer { position: relative; text-align: center; }
        #mapWrapper { position:relative; display:inline-block; }
        #mapImage { max-width: 100%; height: auto; }
        #mapSvgOverlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    </style>
</head>
<body>
<div id="clock">00:00:00</div>
<div id="syncWarning" style="display:none;background:#fff3e0;color:#e65100;text-align:center;padding:6px;font-weight:700;font-size:0.9em;"></div>
<div id="controls">
    <button id="scheduleStartBtn">Schedule Start</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="stopBtn" disabled>Stop &amp; Reset</button>
    <button id="muteBtn" aria-pressed="false">Mute</button>
    <button id="toggleModeBtn" aria-pressed="false">Switch to Candidate Mode</button>
</div>
<div id="startTimeContainer">
    <label for="startTimeInput" style="font-weight:700;margin-right:8px;">Start Time (hh:mm:ss):</label>
    <input id="startTimeInput" type="time" step="1" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:140px;"/>
    <button id="applyStartTimeBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Apply</button>
    <div style="margin-top:6px;">
        <button class="offset-btn" data-offset="-3600" title="60 minutes earlier">-60m</button>
        <button class="offset-btn" data-offset="-900" title="15 minutes earlier">-15m</button>
        <button class="offset-btn" data-offset="-300" title="5 minutes earlier">-5m</button>
        <button class="offset-btn" data-offset="-60" title="1 minute earlier">-1m</button>
        <button class="offset-btn" data-offset="60" title="1 minute later">+1m</button>
        <button class="offset-btn" data-offset="300" title="5 minutes later">+5m</button>
        <button class="offset-btn" data-offset="900" title="15 minutes later">+15m</button>
        <button class="offset-btn" data-offset="3600" title="60 minutes later">+60m</button>
    </div>
</div>
<div id="searchContainer">
    <input id="searchInput" type="text" placeholder="Enter Candidate ID, Station Name or Station Number" style="font-size:1.1em;padding:6px 12px;border-radius:6px;border:1px solid #bbb;width:320px;margin-right:8px;"/>
    <button id="searchBtn" style="font-size:1.1em;padding:7px 18px;border-radius:6px;border:none;background:#1976d2;color:white;font-weight:700;cursor:pointer;">Search</button>
</div>
<div id="topMenu">
    <ul id="sectionsList"></ul>
    <br/>
    <ul id="subsectionsList"></ul>
</div>
<div id="bottomContent">
    <div class="timer" id="timerDisplay">00:00</div>
    <div class="info" id="infoDisplay">Select a session and phase to see information here.</div>
    <div id="stationModeContainer" aria-live="polite"></div>
    <div id="candidateModeContainer" aria-live="polite" style="display:none;"></div>
    <div id="mapModeContainer" aria-live="polite" style="display:none;">
        <div id="mapWrapper">
            <img id="mapImage" src="config/OSCE_map.jpg" alt="OSCE Map"/>
            <svg id="mapSvgOverlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>
</div>
<script>
(() => {
    const REST_INDICES = STATION_NAMES.reduce((acc, name, i) => (name === "Rest" ? acc.concat(i) : acc), []);
    let modeIndex = 0;
    let lastSearchValue = '';

    function getSessionLabel(i) {
        if (ENABLE_PREPARATION && i === PREPARATION_SESSION_INDEX) return 'Preparation';
        if (ENABLE_BREAK && i === BREAK_SESSION_INDEX) return 'Break';
        let base = i - (ENABLE_PREPARATION ? 1 : 0) - (ENABLE_BREAK && i > BREAK_SESSION_INDEX ? 1 : 0);
        return base >= 0 ? `Session ${base + 1}` : `Session ${i + 1}`;
    }

    function getDataSessionKey(sessionIndex) {
        if (ENABLE_PREPARATION && sessionIndex === PREPARATION_SESSION_INDEX) return "Preparation";
        if (ENABLE_BREAK && sessionIndex === BREAK_SESSION_INDEX) return "Break";
        let baseIdx = sessionIndex;
        if (ENABLE_PREPARATION && sessionIndex > PREPARATION_SESSION_INDEX) baseIdx--;
        if (ENABLE_BREAK && sessionIndex > BREAK_SESSION_INDEX) baseIdx--;
        return `Session ${baseIdx + 1}`;
    }

    const ctrl = TimerCore.createController({
        startTimeStr: START_TIME_AM,
        sessionPhases: SESSION_PHASES,
        examTitle: 'SAHK Final Examination Preparation Course - OSCE Examination',
        getSessionLabel,
        mutedByDefault: true,
        renderContent: () => {
            if (modeIndex === 0) renderStationMode();
            else if (modeIndex === 1) renderCandidateMode();
            else renderMapMode();
        }
    });

    function highlightBoxes(searchValue) {
        document.querySelectorAll('.osce-box.highlight, .candidate-cell.highlight').forEach(el => el.classList.remove('highlight'));
        if (!searchValue) return;
        const search = searchValue.trim().toLowerCase();
        let stationNum = null;
        const match = search.match(/^station\s*(\d{1,2})$/i);
        if (match) {
            stationNum = parseInt(match[1], 10);
            if (stationNum < 1 || stationNum > NUM_STATIONS) stationNum = null;
        }
        let stationNameIndex = null;
        if (!stationNum) stationNameIndex = STATION_NAMES.findIndex(t => t.toLowerCase().includes(search));
        if (modeIndex === 1) {
            document.getElementById('candidateModeContainer').querySelectorAll('.candidate-cell').forEach(cell => {
                const num = cell.querySelector('.candidate-number')?.textContent.trim();
                if (num === searchValue) cell.classList.add('highlight');
                if (stationNum) {
                    const label = cell.querySelector('.candidate-station')?.textContent.match(/Station\s*(\d+)/i);
                    if (label && +label[1] === stationNum) cell.classList.add('highlight');
                }
                if (stationNameIndex >= 0) {
                    const label = cell.querySelector('.candidate-station')?.textContent.toLowerCase();
                    if (label && label.includes(STATION_NAMES[stationNameIndex].toLowerCase())) cell.classList.add('highlight');
                }
            });
        } else if (modeIndex === 0) {
            document.getElementById('stationModeContainer').querySelectorAll('.osce-box').forEach((box, idx) => {
                const cand = box.querySelector('.candidate-row .candidate-name')?.textContent.trim();
                const obs = box.querySelector('.observer-row .candidate-name')?.textContent.trim();
                if (cand === searchValue || obs === searchValue) box.classList.add('highlight');
                if (stationNum === idx + 1) box.classList.add('highlight');
                if (stationNameIndex === idx) box.classList.add('highlight');
            });
        }
    }

    function doSearch() {
        lastSearchValue = document.getElementById('searchInput').value.trim();
        highlightBoxes(lastSearchValue);
        if (modeIndex === 2) renderMapMode();
    }

    function renderStationMode() {
        document.getElementById('candidateModeContainer').style.display = 'none';
        document.getElementById('mapModeContainer').style.display = 'none';
        const smc = document.getElementById('stationModeContainer');
        smc.style.display = 'flex';
        const sessionKey = getDataSessionKey(ctrl.selectedSessionIndex);
        const details = osceData[sessionKey];
        if (!details) { smc.innerHTML = '<p style="text-align:center;color:#666;">No data available.</p>'; return; }
        smc.innerHTML = Array(NUM_STATIONS).fill(0).map((_, i) => {
            const isRest = REST_INDICES.includes(i) ? ' rest-station' : '';
            return `<div class="osce-box${isRest}" tabindex="0" aria-label="Station ${i + 1} details">
              <div class="osce-title">${STATION_NAMES[i]}<br><span style="font-size:0.7em;color:#555;">Station ${i + 1}</span></div>
              <div class="candidate-row"><div class="role-label">Candidate</div><div class="candidate-name">${details.Candidate[i] || '\u2014'}</div></div>
              <div class="observer-row"><div class="role-label">Observer</div><div class="candidate-name">${details.Observer[i] || '\u2014'}</div></div>
            </div>`;
        }).join('');
        highlightBoxes(lastSearchValue);
    }

    function renderCandidateMode() {
        document.getElementById('stationModeContainer').style.display = 'none';
        document.getElementById('mapModeContainer').style.display = 'none';
        const cmc = document.getElementById('candidateModeContainer');
        cmc.style.display = 'flex';
        const sessionKey = getDataSessionKey(ctrl.selectedSessionIndex);
        const details = osceData[sessionKey];
        if (!details) { cmc.innerHTML = '<p style="text-align:center;color:#666;">No data available.</p>'; return; }
        const entries = [];
        for (let i = 0; i < NUM_STATIONS; i++) {
            if (details.Candidate[i]) entries.push({number: details.Candidate[i], stationIndex: i, role: 'Candidate'});
            if (details.Observer[i]) entries.push({number: details.Observer[i], stationIndex: i, role: 'Observer'});
        }
        entries.sort((a, b) => a.number.localeCompare(b.number));
        cmc.innerHTML = entries.map(({number, stationIndex, role}) => {
            let cls = 'candidate-cell' + (role === "Observer" ? " observer-cell" : "") + (REST_INDICES.includes(stationIndex) ? " rest-station" : "");
            return `<div class="${cls}" tabindex="0" aria-label="${role} ${number}, Station ${stationIndex + 1}">
              <div class="candidate-number">${number}</div>
              <div class="candidate-role ${role.toLowerCase()}">${role}</div>
              <div class="candidate-station">${STATION_NAMES[stationIndex]}<br><span style="font-size:0.8em;color:#555;">Station ${stationIndex + 1}</span></div>
            </div>`;
        }).join('');
        highlightBoxes(lastSearchValue);
    }

    function renderMapMode() {
        document.getElementById('stationModeContainer').style.display = 'none';
        document.getElementById('candidateModeContainer').style.display = 'none';
        document.getElementById('mapModeContainer').style.display = 'block';
        const sessionKey = getDataSessionKey(ctrl.selectedSessionIndex);
        const details = osceData[sessionKey];
        const svg = document.getElementById('mapSvgOverlay');
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        if (!details) {
            const ns = "http://www.w3.org/2000/svg";
            const t = document.createElementNS(ns, "text");
            t.setAttribute("x", "50%"); t.setAttribute("y", "50%");
            t.setAttribute("dominant-baseline", "middle"); t.setAttribute("text-anchor", "middle");
            t.setAttribute("fill", "#666"); t.textContent = "No data available.";
            svg.appendChild(t);
            return;
        }
        const search = (lastSearchValue || '').trim().toLowerCase();
        let stationNumSearch = null;
        const match = search.match(/^station\s*(\d{1,2})$/i);
        if (match) { const n = parseInt(match[1], 10); if (n >= 1 && n <= NUM_STATIONS) stationNumSearch = n; }
        let stationNameIndex = null;
        if (!stationNumSearch) stationNameIndex = STATION_NAMES.findIndex(t => t.toLowerCase().includes(search));
        const SVG_NS = "http://www.w3.org/2000/svg";
        for (let i = 0; i < NUM_STATIONS; i++) {
            let highlighted = false;
            if (search) {
                const c = (details.Candidate[i] || '').toLowerCase();
                const o = (details.Observer[i] || '').toLowerCase();
                if (c === search || o === search) highlighted = true;
                if (stationNumSearch === i + 1) highlighted = true;
                if (stationNameIndex === i) highlighted = true;
            }
            const pos = stationPositions[i] || {x: 100 + i * 50, y: 100};
            const g = document.createElementNS(SVG_NS, "g");
            g.setAttribute("tabindex", "0");
            g.setAttribute("aria-label", `Station ${i + 1}: ${STATION_NAMES[i]}`);
            g.classList.add("station-group");
            const bg = document.createElementNS(SVG_NS, "rect");
            bg.setAttribute("x", pos.x - 40); bg.setAttribute("y", pos.y - 20);
            bg.setAttribute("width", 50); bg.setAttribute("height", 40);
            bg.classList.add("station-bg"); g.appendChild(bg);
            const sq = document.createElementNS(SVG_NS, "rect");
            sq.setAttribute("x", pos.x - 40); sq.setAttribute("y", pos.y - 15);
            sq.classList.add("station-square"); if (highlighted) sq.classList.add("highlighted"); g.appendChild(sq);
            const nt = document.createElementNS(SVG_NS, "text");
            nt.setAttribute("x", pos.x - 25); nt.setAttribute("y", pos.y + 5);
            nt.setAttribute("text-anchor", "middle"); nt.classList.add("station-number-text");
            nt.textContent = i + 1; g.appendChild(nt);
            const cc = document.createElementNS(SVG_NS, "circle");
            cc.setAttribute("cx", pos.x); cc.setAttribute("cy", pos.y - 7);
            cc.classList.add("candidate-circle"); g.appendChild(cc);
            const ct = document.createElementNS(SVG_NS, "text");
            ct.setAttribute("x", pos.x); ct.setAttribute("y", pos.y - 2);
            ct.setAttribute("text-anchor", "middle"); ct.classList.add("candidate-text");
            ct.textContent = details.Candidate[i] || ''; g.appendChild(ct);
            const oc = document.createElementNS(SVG_NS, "circle");
            oc.setAttribute("cx", pos.x); oc.setAttribute("cy", pos.y + 10);
            oc.classList.add("observer-circle"); g.appendChild(oc);
            const ot = document.createElementNS(SVG_NS, "text");
            ot.setAttribute("x", pos.x); ot.setAttribute("y", pos.y + 15);
            ot.setAttribute("text-anchor", "middle"); ot.classList.add("observer-text");
            ot.textContent = details.Observer[i] || ''; g.appendChild(ot);
            svg.appendChild(g);
        }
    }

    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === "Enter") doSearch(); });
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('input', () => {
        if (!document.getElementById('searchInput').value.trim()) {
            lastSearchValue = ''; highlightBoxes('');
            if (modeIndex === 2) renderMapMode();
        }
    });

    document.getElementById('toggleModeBtn').onclick = () => {
        modeIndex = (modeIndex + 1) % 3;
        const btn = document.getElementById('toggleModeBtn');
        if (modeIndex === 0) { btn.textContent = "Switch to Candidate Mode"; btn.setAttribute('aria-pressed', 'false'); }
        else if (modeIndex === 1) { btn.textContent = "Switch to Map Mode"; btn.setAttribute('aria-pressed', 'false'); }
        else { btn.textContent = "Switch to Station Mode"; btn.setAttribute('aria-pressed', 'false'); }
        (modeIndex === 0 ? renderStationMode() : modeIndex === 1 ? renderCandidateMode() : renderMapMode());
        highlightBoxes(lastSearchValue);
    };

    document.body.addEventListener('click', () => {
        const ctx = (() => { try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; } })();
        if (ctx) ctx.close();
    }, { once: true });

    ctrl.init();
})();
</script>
</body>
</html>
